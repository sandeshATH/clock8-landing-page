document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

al=\"{{true}}\">\n          <div>\n            <p style=\"font-size:14.5px;color:#5E5A5E;margin:0 0 18px;line-height:1.5;\">Two quick questions so we build the right thing — and tell you the day we launch.<\u002Fp>\n            <form onsubmit=\"{{submitWaitlist}}\">\n              <label style=\"display:block;font-weight:700;font-size:13.5px;margin-bottom:6px;color:#3A363A;\">Work email<\u002Flabel>\n              <input type=\"email\" required=\"\" value=\"{{email}}\" oninput=\"{{onEmail}}\" placeholder=\"you@studio.com\" style=\"width:100%;padding:12px 14px;border:1.5px solid #DDD3DD;border-radius:11px;font-size:15px;margin-bottom:16px;\" style-focus=\"border-color:#4A154B;\">\n              <label style=\"display:block;font-weight:700;font-size:13.5px;margin-bottom:6px;color:#3A363A;\">What do you track time with today?<\u002Flabel>\n              <select required=\"\" value=\"{{currentTool}}\" onchange=\"{{onTool}}\" style=\"width:100%;padding:12px 14px;border:1.5px solid #DDD3DD;border-radius:11px;font-size:15px;margin-bottom:16px;background:#fff;\" style-focus=\"border-color:#4A154B;\">\n                <option value=\"\">Select one…<\u002Foption>\n                <option value=\"clockify\">Clockify<\u002Foption>\n                <option value=\"toggl\">Toggl Track<\u002Foption>\n                <option value=\"timecamp\">TimeCamp<\u002Foption>\n                <option value=\"spreadsheet\">A spreadsheet<\u002Foption>\n                <option value=\"none\">Nothing yet<\u002Foption>\n                <option value=\"other\">Other<\u002Foption>\n              <\u002Fselect>\n              <label style=\"display:block;font-weight:700;font-size:13.5px;margin-bottom:6px;color:#3A363A;\">How big is your team?<\u002Flabel>\n              <select required=\"\" value=\"{{waitTeam}}\" onchange=\"{{onWaitTeam}}\" style=\"width:100%;padding:12px 14px;border:1.5px solid #DDD3DD;border-radius:11px;font-size:15px;margin-bottom:20px;background:#fff;\" style-focus=\"border-color:#4A154B;\">\n                <option value=\"\">Select one…<\u002Foption>\n                <option value=\"1-5\">1–5 people<\u002Foption>\n                <option value=\"6-10\">6–10 people<\u002Foption>\n                <option value=\"11-20\">11–20 people<\u002Foption>\n                <option value=\"21+\">21+ people<\u002Foption>\n              <\u002Fselect>\n              <button type=\"submit\" style=\"width:100%;border:none;cursor:pointer;background:#4A154B;color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:12px;\" style-hover=\"background:#3A0F3B;\">Join the waitlist<\u002Fbutton>\n              <p style=\"text-align:center;font-size:11.5px;color:#A79FA7;margin:12px 0 0;\">No spam. One email when we launch. <!-- TODO: wire submit to your email API --><\u002Fp>\n            <\u002Fform>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 900 },\n  &quot;launchQuarter&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Q4 2026&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;closeDate&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;August 31, 2026&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;foundingCap&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 100, &quot;min&quot;: 10, &quot;max&quot;: 500, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;seatsClaimed&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 37, &quot;min&quot;: 0, &quot;max&quot;: 500, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;annualPrice&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 99, &quot;min&quot;: 1, &quot;max&quot;: 999, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;teamCap&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 20, &quot;min&quot;: 1, &quot;max&quot;: 100, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;stripeLink&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://buy.stripe.com/REPLACE_WITH_PAYMENT_LINK&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    seconds: 8137,\n    teamSize: 5,\n    seatsClaimed: 37,\n    faqOpen: 0,\n    modal: null,            // 'preorder' | 'waitlist' | null\n    email: '',\n    currentTool: '',\n    waitTeam: '',\n    submitted: false,\n    demoTab: 'timer',\n    reportCycle: 0,\n    timesheet: [\n      { project: 'Website redesign', hours: [0, 0, 0, 0, 0] },\n      { project: 'Brand guidelines', hours: [0, 0, 0, 0, 0] },\n      { project: 'Q3 campaign', hours: [0, 0, 0, 0, 0] },\n    ],\n    tsSteps: 0,\n    tsPhase: 'filling',\n  };\n\n  TS_TARGET = [\n    { project: 'Website redesign', hours: [2.5, 3, 4, 2, 1.5] },\n    { project: 'Brand guidelines', hours: [1, 2, 0, 3, 2] },\n    { project: 'Q3 campaign', hours: [0, 1.5, 2, 1, 2.5] },\n  ];\n\n  // Phased animation: fill each row → submit for review → admin approves → reset & loop\n  tsStep = () => {\n    this.setState(s => {\n      const step = s.tsSteps || 0;\n      const n = this.TS_TARGET.length;\n      if (step < n) {\n        const ts = s.timesheet.map(r => ({ project: r.project, hours: [...r.hours] }));\n        ts[step].hours = [...this.TS_TARGET[step].hours];\n        return { timesheet: ts, tsSteps: step + 1, tsPhase: 'filling' };\n      }\n      if (step === n) return { tsSteps: step + 1, tsPhase: 'review' };\n      if (step === n + 1) return { tsSteps: step + 1, tsPhase: 'approved' };\n      return {\n        timesheet: this.TS_TARGET.map(r => ({ project: r.project, hours: [0, 0, 0, 0, 0] })),\n        tsSteps: 0, tsPhase: 'filling',\n      };\n    });\n  };\n\n  get cap(){ return this.props.foundingCap ?? 100; }\n  get teamCap(){ return this.props.teamCap ?? 20; }\n  get price(){ return this.props.annualPrice ?? 99; }\n  get closeDate(){ return this.props.closeDate ?? 'August 31, 2026'; }\n  get launchQuarter(){ return this.props.launchQuarter ?? 'Q4 2026'; }\n  get stripeLink(){ return this.props.stripeLink ?? 'https://buy.stripe.com/REPLACE_WITH_PAYMENT_LINK'; }\n\n  // per-user / month list prices (verify before go-live)\n  RATES = { clockify: 5.49, toggl: 9, timecamp: 3.99 };\n\n  componentDidMount(){\n    this.captureUTM();\n    this.fetchSeats();\n    this.timer = setInterval(() => this.setState(s => ({ seconds: s.seconds + 1 })), 1000);\n    this.tsTimer = setInterval(this.tsStep, 1600);\n    this.reportTimer = setInterval(() => this.setState(s => ({ reportCycle: (s.reportCycle || 0) + 1 })), 2000);\n  }\n  componentWillUnmount(){ if(this.timer) clearInterval(this.timer); if(this.tsTimer) clearInterval(this.tsTimer); if(this.reportTimer) clearInterval(this.reportTimer); }\n\n  captureUTM(){\n    this.utm = {};\n    try {\n      const p = new URLSearchParams(window.location.search);\n      ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','gclid','fbclid'].forEach(k => {\n        const v = p.get(k); if(v) this.utm[k] = v;\n      });\n    } catch(e){}\n  }\n\n  // PLACEHOLDER: replace with a real backend read so the count is honest and\n  // does NOT reset on reload. e.g.\n  //   const r = await fetch('https://api.clock8.app/founding-seats');\n  //   const { claimed } = await r.json();\n  //   this.setState({ seatsClaimed: claimed });\n  async fetchSeats(){\n    try {\n      const seeded = this.props.seatsClaimed ?? 37;\n      this.setState({ seatsClaimed: seeded });\n    } catch(e){}\n  }\n\n  fmt(n){ return '$' + Math.round(n).toLocaleString('en-US'); }\n\n  pad(n){ return String(n).padStart(2,'0'); }\n\n  buildFeatures(){\n    const ok = (color) => React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:3,strokeLinecap:'round',strokeLinejoin:'round'},React.createElement('path',{d:'M20 6L9 17l-5-5'}));\n    const no = () => React.createElement('span',{style:{color:'#CFC6CF',fontWeight:700,fontSize:'15px'}},'—');\n    const C = ok('#4A154B'), Y = ok('#2EB67D');\n    const rows = [\n      ['One-click timer', true, true, true],\n      ['Projects & clients', true, true, true],\n      ['Timesheets & approvals', true, true, true],\n      ['Reports + CSV/PDF export', true, true, true],\n      ['Billable rates', true, true, true],\n      ['Simple invoicing', true, true, false],\n      ['Team dashboard', true, true, true],\n      ['Flat team pricing', false, false, false, true],\n    ];\n    return rows.map((r,i) => ({\n      name: r[0],\n      rowBg: r[4] ? '#FBF4FB' : (i % 2 ? '#FCFAFC' : '#FFFFFF'),\n      c8: C,\n      cf: r[1] ? Y : no(),\n      tg: r[2] ? Y : no(),\n      tc: r[3] ? Y : no(),\n    }));\n  }\n\n  buildFaqs(){\n    const items = [\n      { q: 'Is my card really charged now?', a: \"Yes — we charge the full $99 today so your founding price is locked in for launch. It's completely refundable: ask any time before launch and we return every cent, no questions asked.\" },\n      { q: 'What happens to my price at launch?', a: \"Your $99/year founding price is locked in for the launch offer. When we move to per-user pricing later on, founding teams keep a permanent 20% discount on whatever plan you're on — our thank-you for backing us early.\" },\n      { q: 'What if my team grows past 20 people?', a: \"The founding offer covers your whole team — up to 20 people — for $99/year. Beyond that, additional users are billed at our future per-user rate, always with your standing 20% founding discount applied.\" },\n      { q: 'When exactly do you launch?', a: 'We\\'re targeting ' + this.launchQuarter + '. Founding teams get first access and we email you the moment it\\'s live. If we slip, your refund window stays open until then.' },\n      { q: 'How is this cheaper than Clockify\\'s free plan?', a: \"Free plans cover basic tracking. The moment you need invoicing, billable rates or approvals, Clockify's bill starts — and it's per seat, every month. Clock8 includes all of that for one flat $99/year.\" },\n    ];\n    return items.map((it,i) => ({\n      q: it.q,\n      a: it.a,\n      open: this.state.faqOpen === i,\n      iconRot: this.state.faqOpen === i ? 'rotate(45deg)' : 'rotate(0deg)',\n      toggle: () => this.setState(s => ({ faqOpen: s.faqOpen === i ? -1 : i })),\n    }));\n  }\n\n  goStripe = () => {\n    const params = new URLSearchParams(this.utm || {});\n    const sep = this.stripeLink.includes('?') ? '&' : '?';\n    const url = this.stripeLink + (params.toString() ? sep + params.toString() : '');\n    // PLACEHOLDER: this opens your Stripe Payment Link with UTM attribution attached.\n    try { window.open(url, '_blank', 'noopener'); } catch(e){}\n  };\n\n  submitWaitlist = (e) => {\n    e.preventDefault();\n    const payload = {\n      email: this.state.email,\n      currentTool: this.state.currentTool,\n      teamSize: this.state.waitTeam,\n      ...(this.utm || {}),\n    };\n    // PLACEHOLDER: POST `payload` to your email API (Mailchimp / ConvertKit / Loops…).\n    //   fetch('https://api.clock8.app/waitlist', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });\n    try { console.log('[Clock8] waitlist signup', payload); } catch(_){}\n    this.setState({ submitted: true });\n  };\n\n  addTimesheet = (e) => {\n    e.preventDefault();\n    const name = (this.state.tsProject || '').trim();\n    const hrs = parseFloat(this.state.tsHours);\n    if (!name || !(hrs > 0)) return;\n    const di = ['Mon','Tue','Wed','Thu','Fri'].indexOf(this.state.tsDay);\n    const hours = [0, 0, 0, 0, 0];\n    hours[di < 0 ? 0 : di] = hrs;\n    this.setState(s => ({\n      timesheet: [...s.timesheet, { project: name, hours }],\n      tsProject: '', tsHours: '',\n    }));\n  };\n\n  renderVals(){\n    const ts = this.state.teamSize;\n    const clock8 = this.price;\n    const clockify = this.RATES.clockify * 12 * ts;\n    const toggl = this.RATES.toggl * 12 * ts;\n    const timecamp = this.RATES.timecamp * 12 * ts;\n    const maxComp = Math.max(clockify, toggl, timecamp);\n    const H = 248; // px at tallest bar\n    const h = (v) => Math.max(8, Math.round(v / maxComp * H)) + 'px';\n    const wp = (v) => Math.max(4, Math.round(v / maxComp * 100)) + '%';\n\n    const claimed = this.state.seatsClaimed;\n    const seatsRemaining = Math.max(0, this.cap - claimed);\n    const pct = Math.min(100, Math.round(claimed / this.cap * 100));\n\n    const s = this.state.seconds;\n    const elapsed = this.pad(Math.floor(s/3600)) + ':' + this.pad(Math.floor((s%3600)/60)) + ':' + this.pad(s%60);\n\n    const fmtH = (x) => x ? (x % 1 ? x.toFixed(1) : String(x)) : '—';\n    const tsDays = ['Mon','Tue','Wed','Thu','Fri'];\n    const tsRows = this.state.timesheet.map(r => ({\n      project: r.project,\n      cells: r.hours.map(fmtH),\n      total: fmtH(r.hours.reduce((a,b)=>a+b,0)),\n    }));\n    const tsColTotals = tsDays.map((_,di) => fmtH(this.state.timesheet.reduce((a,r)=>a+(r.hours[di]||0),0)));\n    const tsGrand = fmtH(this.state.timesheet.reduce((a,r)=>a+r.hours.reduce((x,y)=>x+y,0),0));\n\n    const reportProjects = [\n      { name:'Website redesign', hours:'52h', w:'90%', color:'#36C5F0' },\n      { name:'Brand guidelines', hours:'31h', w:'54%', color:'#2EB67D' },\n      { name:'Q3 campaign', hours:'24h', w:'42%', color:'#ECB22E' },\n      { name:'Internal · QA', hours:'9h', w:'16%', color:'#E01E5A' },\n    ];\n    const reportCycleSeq = ['all', 'Website redesign', 'Brand guidelines', 'Q3 campaign', 'Internal · QA'];\n    const reportActive = reportCycleSeq[(this.state.reportCycle || 0) % reportCycleSeq.length];\n    const reportBars = reportProjects.map(p => ({\n      name: p.name, hours: p.hours, w: p.w, color: p.color,\n      opacity: (reportActive === 'all' || reportActive === p.name) ? '1' : '0.22',\n    }));\n    const reportFilterLabel = reportActive === 'all' ? 'All projects' : reportActive;\n\n    return {\n      cap: this.cap,\n      teamCap: this.teamCap,\n      closeDate: this.closeDate,\n      launchQuarter: this.launchQuarter,\n\n      elapsed,\n\n      teamSize: ts,\n      onSlide: (e) => this.setState({ teamSize: +e.target.value }),\n      clock8Fmt: this.fmt(clock8),\n      clockifyFmt: this.fmt(clockify),\n      togglFmt: this.fmt(toggl),\n      timecampFmt: this.fmt(timecamp),\n      clock8H: h(clock8),\n      clockifyH: h(clockify),\n      togglH: h(toggl),\n      timecampH: h(timecamp),\n      clock8W: wp(clock8),\n      clockifyW: wp(clockify),\n      togglW: wp(toggl),\n      timecampW: wp(timecamp),\n      savingsFmt: this.fmt(maxComp - clock8),\n      clockifyOverFmt: '+' + this.fmt(clockify - clock8),\n      togglOverFmt: '+' + this.fmt(toggl - clock8),\n      timecampOverFmt: '+' + this.fmt(timecamp - clock8),\n      clockifyOverW: Math.max(6, Math.round((clockify - clock8) / (maxComp - clock8) * 100)) + '%',\n      togglOverW: Math.max(6, Math.round((toggl - clock8) / (maxComp - clock8) * 100)) + '%',\n      timecampOverW: Math.max(6, Math.round((timecamp - clock8) / (maxComp - clock8) * 100)) + '%',\n      multipleFmt: (maxComp / clock8).toFixed(1) + '×',\n\n      seatsRemaining,\n      seatsClaimedTxt: claimed,\n      seatsPct: pct + '%',\n\n      features: this.buildFeatures(),\n      faqs: this.buildFaqs(),\n\n      // interactive demo\n      demoTabs: [\n        { key: 'timer', label: 'One-click timer' },\n        { key: 'projects', label: 'Projects & clients' },\n        { key: 'timesheet', label: 'Timesheets' },\n        { key: 'reports', label: 'Reports & export' },\n      ].map(t => ({\n        label: t.label,\n        onClick: () => this.setState({ demoTab: t.key }),\n        style: (this.state.demoTab === t.key\n          ? 'cursor:pointer;border:1.5px solid #4A154B;background:#4A154B;color:#fff;'\n          : 'cursor:pointer;border:1.5px solid #E3D7E3;background:#fff;color:#5E5A5E;')\n          + 'font-weight:700;font-size:14.5px;padding:10px 18px;border-radius:999px;transition:transform .15s ease, background .15s ease;',\n      })),\n      showTimer: this.state.demoTab === 'timer',\n      showProjects: this.state.demoTab === 'projects',\n      showTimesheet: this.state.demoTab === 'timesheet',\n      showReports: this.state.demoTab === 'reports',\n\n      tsRows, tsColTotals, tsGrand,\n      tsFilling: this.state.tsPhase === 'filling',\n      tsReview: this.state.tsPhase === 'review',\n      tsApproved: this.state.tsPhase === 'approved',\n      tsBadgeLabel: this.state.tsPhase === 'approved' ? 'Approved' : (this.state.tsPhase === 'review' ? 'In review' : 'Draft'),\n      tsBadgeColor: this.state.tsPhase === 'approved' ? '#1F8A5B' : (this.state.tsPhase === 'review' ? '#1E8BB8' : '#B8861E'),\n      tsBadgeBg: this.state.tsPhase === 'approved' ? '#E6F5EE' : (this.state.tsPhase === 'review' ? '#E1F2FB' : '#FBF1D7'),\n      tsBadgeDot: this.state.tsPhase === 'approved' ? '#2EB67D' : (this.state.tsPhase === 'review' ? '#36C5F0' : '#ECB22E'),\n\n      reportBars,\n      reportFilterLabel,\n\n      // modals\n      openPreorder: () => this.setState({ modal: 'preorder' }),\n      openWaitlist: () => this.setState({ modal: 'waitlist', submitted: false }),\n      closeModal: () => this.setState({ modal: null }),\n      stop: (e) => e.stopPropagation(),\n      preorderOpen: this.state.modal === 'preorder',\n      waitlistOpen: this.state.modal === 'waitlist',\n      switchToPreorder: () => this.setState({ modal: 'preorder' }),\n\n      // waitlist form\n      email: this.state.email,\n      currentTool: this.state.currentTool,\n      waitTeam: this.state.waitTeam,\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      onTool: (e) => this.setState({ currentTool: e.target.value }),\n      onWaitTeam: (e) => this.setState({ waitTeam: e.target.value }),\n      submitWaitlist: this.submitWaitlist,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      goStripe: this.goStripe,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
